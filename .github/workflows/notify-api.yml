  name: Trigger API rebuild on model update

  on:
    push:
      branches: [main]

  jobs:
    dispatch:
      runs-on: ubuntu-latest
      steps:
        - name: Fire repository_dispatch
          run: |
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/hajisan/nimasalami.dk/dispatches \
              -d '{"event_type": "model-updated"}'
